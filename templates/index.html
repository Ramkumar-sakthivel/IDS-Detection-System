<!DOCTYPE html>
<html>
<head>
    <title>SOC Dashboard - IDS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d1117;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background-color: #161b22;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
        }
        .btn-custom {
            background-color: #00ff88;
            border: none;
        }
        .btn-custom:hover {
            background-color: #00cc6a;
        }
    </style>
</head>
<body>

<div class="card p-5 text-center" style="width: 500px;">
    <h2 class="mb-3">🛡️ Security Operations Center</h2>
    <p class="text-muted">Upload Network Flow Feature CSV</p>

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" class="form-control mb-3" name="file" required>
        <button type="submit" class="btn btn-custom w-100">Analyze Traffic</button>
    </form>
</div>

</body>
</html>
